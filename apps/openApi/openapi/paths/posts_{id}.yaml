get:
  operationId: getPostById
  summary: Get post by ID
  tags:
    - Posts
  parameters:
    - name: id
      in: path
      required: true
      schema: 
        type: string
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/PostResponse.yaml
    "404":
      description: Not Found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error404.yaml

patch:
  operationId: updatePostById
  summary: Update post by ID
  tags:
    - Posts
  security:
    - cookieAuth: []
  parameters:
    - name: id
      in: path
      required: true
      schema: 
        type: string
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          $ref: ../components/schemas/PostUpdateRequest.yaml
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/PostResponse.yaml
    "400":
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error400.yaml
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error401.yaml
    "404":
      description: Not Found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error404.yaml

delete:
  operationId: deletePostById
  summary: Delete post by ID
  tags: 
    - Posts
  security:
    - cookieAuth: []
  parameters:
    - name: id
      in: path
      required: true
      schema: 
        type: string
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/PostResponse.yaml
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error401.yaml
    "404":
      description: Not Found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error404.yaml