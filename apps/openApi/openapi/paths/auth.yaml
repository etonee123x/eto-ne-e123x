post:
  operationId: createAuth
  summary: Create auth cookie
  tags: 
    - Auth
  parameters:
    - in: query
      name: jwt
      schema:
        type: string
      description: JWT token to set in auth cookie
  security:
    - cookieAuth: []
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              jwt:
                type: string
            required:
              - jwt
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error401.yaml

delete:
  operationId: deleteAuth
  summary: Clear auth cookie
  tags: 
    - Auth
  security:
    - cookieAuth: []
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              jwt:
                type: string
                nullable: true
                enum: 
                  - null
            required:
              - jwt
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error401.yaml
